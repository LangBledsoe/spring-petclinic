# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time 
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven 

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: self-hosted
    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'adopt'
          cache: maven
      - name: Build with Maven Wrapper
        run: ./mvnw -B package
      - name: Upload to Nexus
        run: curl -v -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} --upload-file target/spring-petclinic-3.1.0-SNAPSHOT.jar http://10.244.0.14:8081/repository/maven-releases/com/example/spring-petclinic/3.1.0-SNAPSHOT/spring-petclinic-3.1.0-SNAPSHOT.jar

